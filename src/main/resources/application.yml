spring:
  h2:
    console:
      enabled: false

allowed-origins: http://*:3000
default-password: password

---

spring:
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
  config:
    activate:
      on-profile: prod

allowed-origins: "https://www.firstlegoleague.win,https://*.vercel.app,http://*:3000"

logging:
  level:
    org:
      hibernate: error
      springframework.core: error
      springframework.web: error
    root: error
